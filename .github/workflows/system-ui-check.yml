name: System UI syntax check

on:
  pull_request:

permissions:
  contents: write

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply focused phone patch
        run: node scripts/apply-phone-first-ui.mjs
      - name: Check browser scripts
        run: |
          node --check public/app.js
          node --check public/permissions.js
          node --check public/docx-viewer.js
          node --check public/startup-settings.js
      - name: Commit applied fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/system-compact.css public/startup-settings.css public/startup-settings.js
          git diff --cached --quiet || git commit -m "Apply phone-first real UI fixes"
          git push
