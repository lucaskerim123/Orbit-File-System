name: System UI syntax check

on:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check browser scripts
        run: |
          node --check public/app.js
          node --check public/permissions.js
          node --check public/docx-viewer.js
          node --check public/startup-settings.js
          node --check public/storage-status.js
